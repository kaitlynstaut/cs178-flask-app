<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clothing Catalog</title>
    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5">Clothing Catalog</h2>
        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark"> <!-- creates a dark background for the table header -->
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Color</th>
                    <th>Material</th>
                    <th>Stock</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody> <!-- table body -- loop through all of the items -->
                {% for item in items %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>{{ item.category }}</td>
                    <td>{{ item.color }}</td>
                    <td>{{ item.material }}</td>
                    <td>{{ item.stock_qty }}</td>
                    <td>${{ item.base_price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
 </body>
</html>
