<!DOCTYPE html>
<html lang="en">
<head>
    <title>Customer</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">Customer Wishlist</h1>
        <div class="mt-3">
            <a href="/add-to-wishlist" class="btn btn-primary">Add to Wishlist</a>
            <a href="/view-wishlist" class="btn btn-info">View Wishlist</a>
            <a href="/update-wishlist" class="btn btn-secondary">Update Wishlist</a>
            <a href="/clear-wishlist" class="btn btn-danger">Clear Wishlist</a>
        </div>
        <div class="mt-3">
            <a href="/" class="btn btn-dark">Back to Home</a>
        </div>
    </div>
</body>
</html>
