<!DOCTYPE html>
<html lang="en">
<head>
    <title>Store Admin</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">Store Admin</h1>
        <div class="mt-3">
            <a href="/add-item" class="btn btn-primary">Add Item</a>
            <a href="/delete-item" class="btn btn-danger">Delete Item</a>
            <a href="/update-stock" class="btn btn-secondary">Update Stock</a>
            <a href="/browsetextbox" class="btn btn-info">Browse Inventory</a>
        </div>
        <div class="mt-3">
            <a href="/" class="btn btn-dark">Back to Home</a>
        </div>
    </div>
</body>
</html>
