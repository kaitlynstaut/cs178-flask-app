<!doctype html>
<html lang="en">
  <head>
    <title>Add Item</title>
  </head>
  <body>
    <h1>Add New Clothing Item</h1>
    <form action="{{ url_for('add_item') }}" method="post">
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" required /><br />
      <label for="category">Category:</label><br />
      <select id="category" name="category" required>
        {% for category in categories %}
          <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
      </select><br />
      <label for="price">Base Price:</label><br />
      <input type="text" id="price" name="price" required /><br />
      <label for="color">Color:</label><br />
      <input type="text" id="color" name="color" required /><br />
      <label for="sku">SKU:</label><br />
      <input type="text" id="sku" name="sku" required /><br />
      <label for="stock_qty">Stock Quantity:</label><br />
      <input type="number" id="stock_qty" name="stock_qty" required /><br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
