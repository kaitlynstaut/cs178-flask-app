<!DOCTYPE html>
<html>
<head>
    <title>Browse Inventory</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container"></div>
    <h2>Results for: {{ category }}</h2>

    {% if items %}
    <table class="table table-bordered table-striped mt-3">
        <thead class="thead-dark">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Color</th>
                <th>Price</th>
                <th>SKU</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.color }}</td>
                <td>${{ item.base_price }}</td>
                <td>{{ item.sku }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>No items found for "<strong>{{ category }}</strong>".</p>
    {% endif %}

    <br>
    <a href="/browsetextbox" class="btn btn-secondary">Search Again</a>
    <a href="/admin" class="btn btn-secondary">Back to Admin</a>
</body>
</html>
