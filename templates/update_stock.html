<!doctype html>
<html lang="en">
  <head>
    <title>Update Stock</title>
  </head>
  <body>
    <h1>Update Stock Quantity</h1>
    <form action="{{ url_for('update_stock') }}" method="post">
      <label for="sku">SKU:</label><br />
      <input type="text" id="sku" name="sku" required /><br />
      <label for="stock_qty">New Stock Quantity:</label><br />
      <input type="text" id="stock_qty" name="stock_qty" required /><br />
      <input type="submit" value="Update" />
    </form>
  </body>
</html>
